<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master — 230 Sentences</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3a;--accent:#7c6aff;--accent2:#ff6a9e;--accent3:#6affda;--text:#e8e8f0;--text-dim:#7a7a9a;--correct:#4ade80;--wrong:#f87171;--warn:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
body::after{content:'';position:fixed;top:-30%;left:50%;transform:translateX(-50%);width:60vw;height:60vw;background:radial-gradient(ellipse,rgba(124,106,255,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 20px 80px;}
header{padding:36px 0 24px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--border);margin-bottom:28px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;background:linear-gradient(135deg,#7c6aff,#ff6a9e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.logo span{-webkit-text-fill-color:var(--accent3);}
.stats-bar{display:flex;gap:16px;}
.stat{text-align:right;line-height:1.2;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);}
.stat-label{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;}
.progress-track{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:24px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.5s;}

/* Top nav */
.top-nav{display:flex;gap:8px;margin-bottom:20px;}
.top-nav-btn{padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.top-nav-btn.active{background:var(--surface);border-color:var(--accent);color:var(--accent);}
.top-nav-btn:hover:not(.active){color:var(--text);border-color:var(--text-dim);}

/* Mode tabs */
.mode-tabs{display:flex;gap:6px;margin-bottom:24px;background:var(--surface);padding:5px;border-radius:14px;border:1px solid var(--border);flex-wrap:wrap;}
.mode-tab{flex:1;padding:9px 6px;border:none;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all 0.2s;background:transparent;color:var(--text-dim);white-space:nowrap;min-width:80px;}
.mode-tab.active{background:var(--accent);color:white;box-shadow:0 4px 20px rgba(124,106,255,0.4);}
.mode-tab:hover:not(.active){color:var(--text);background:var(--surface2);}

/* Quiz card */
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:20px;position:relative;overflow:hidden;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));}
.sentence-num{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--accent);margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.sentence-num::after{content:'';flex:1;height:1px;background:var(--border);}
.tts-controls{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.play-btn{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 20px rgba(124,106,255,0.4);transition:all 0.2s;font-size:18px;flex-shrink:0;}
.play-btn:hover{transform:scale(1.08);}
.play-btn.playing{animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(124,106,255,0.4)}50%{box-shadow:0 4px 30px rgba(124,106,255,0.8)}}
.speed-controls{display:flex;gap:5px;}
.speed-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;transition:all 0.2s;}
.speed-btn.active{border-color:var(--accent3);color:var(--accent3);background:rgba(106,255,218,0.08);}
.repeat-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;cursor:pointer;transition:all 0.2s;margin-left:auto;}
.repeat-btn.active{border-color:var(--warn);color:var(--warn);background:rgba(251,191,36,0.08);}
.korean-hint{font-size:13px;color:var(--text-dim);margin-bottom:18px;padding:10px 14px;background:var(--surface2);border-radius:10px;border-left:3px solid var(--accent);display:none;}
.korean-hint.show{display:block;}

/* Fill blank */
.sentence-display{font-family:'DM Mono',monospace;font-size:17px;line-height:2.2;margin-bottom:22px;word-break:break-word;}
.blank-input{display:inline-block;min-width:90px;border-bottom:2px solid var(--accent);background:rgba(124,106,255,0.08);border-radius:6px 6px 0 0;padding:2px 7px;font-family:'DM Mono',monospace;font-size:17px;color:var(--text);outline:none;transition:all 0.2s;vertical-align:baseline;}
.blank-input:focus{border-color:var(--accent2);background:rgba(255,106,158,0.08);}
.blank-input.correct{border-color:var(--correct);background:rgba(74,222,128,0.1);color:var(--correct);}
.blank-input.wrong{border-color:var(--wrong);background:rgba(248,113,113,0.1);color:var(--wrong);}

/* Word meaning mode */
.meaning-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;}
.word-clue{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.word-pos{font-size:11px;color:var(--accent3);background:rgba(106,255,218,0.1);border:1px solid rgba(106,255,218,0.2);border-radius:6px;padding:2px 8px;letter-spacing:1px;text-transform:uppercase;}
.word-meaning-ko{font-size:15px;color:var(--text);line-height:1.5;margin-bottom:12px;}
.word-example{font-size:12px;color:var(--text-dim);font-style:italic;margin-bottom:14px;padding-left:10px;border-left:2px solid var(--border);}
.word-answer-input{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'DM Mono',monospace;font-size:16px;color:var(--text);outline:none;transition:border-color 0.2s;letter-spacing:1px;}
.word-answer-input:focus{border-color:var(--accent);}
.word-answer-input.correct{border-color:var(--correct);color:var(--correct);}
.word-answer-input.wrong{border-color:var(--wrong);color:var(--wrong);}
.letter-hint{font-size:12px;color:var(--text-dim);margin-top:6px;font-family:'DM Mono',monospace;letter-spacing:3px;}

/* Dictation */
.dictation-area{width:100%;background:var(--surface2);border:2px solid var(--border);border-radius:14px;padding:14px 18px;font-family:'DM Mono',monospace;font-size:15px;color:var(--text);resize:none;outline:none;min-height:76px;transition:border-color 0.2s;line-height:1.6;}
.dictation-area:focus{border-color:var(--accent);}
.dictation-area.correct{border-color:var(--correct);}
.dictation-area.wrong{border-color:var(--wrong);}

/* Result */
.result-display{margin-top:14px;padding:12px 16px;border-radius:12px;font-size:13px;display:none;line-height:1.8;}
.result-display.show{display:block;animation:fadeIn 0.3s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.result-display.correct-result{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--correct);}
.result-display.wrong-result{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.3);color:var(--text);}
.answer-highlight{color:var(--correct);font-weight:600;}
.diff-wrong{color:var(--wrong);text-decoration:line-through;}
.diff-correct{color:var(--correct);}

/* Buttons */
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:10px 20px;border-radius:11px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;box-shadow:0 4px 16px rgba(124,106,255,0.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,106,255,0.5);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid transparent;}
.btn-ghost:hover{color:var(--text);border-color:var(--border);}

/* Nav */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
.hint-toggle{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.hint-toggle:hover{border-color:var(--warn);color:var(--warn);}

/* Settings */
.settings-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.range-label{font-size:12px;color:var(--text-dim);white-space:nowrap;}
.range-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-family:'DM Mono',monospace;font-size:13px;width:72px;outline:none;}
.range-input:focus{border-color:var(--accent);}
.shuffle-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--text-dim);}
.toggle-switch{width:34px;height:19px;background:var(--surface2);border-radius:10px;position:relative;border:1px solid var(--border);transition:background 0.2s;flex-shrink:0;}
.toggle-switch::after{content:'';position:absolute;width:13px;height:13px;background:var(--text-dim);border-radius:50%;top:2px;left:2px;transition:all 0.2s;}
input[type="checkbox"]:checked+.toggle-switch{background:var(--accent);border-color:var(--accent);}
input[type="checkbox"]:checked+.toggle-switch::after{left:17px;background:white;}
input[type="checkbox"]{display:none;}

/* Score */
.score-card{display:flex;gap:10px;margin-bottom:20px;}
.score-item{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
.score-val{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;}
.score-val.good{color:var(--correct);}
.score-val.bad{color:var(--wrong);}
.score-val.neutral{color:var(--accent);}
.score-label{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}

/* Dots */
.memorized-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:18px;}
.mem-dot{width:9px;height:9px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);transition:all 0.3s;cursor:pointer;}
.mem-dot.done{background:var(--correct);border-color:var(--correct);}
.mem-dot.current{background:var(--accent);border-color:var(--accent);animation:pulse 1s infinite;}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 22px;font-size:13px;z-index:1000;transition:transform 0.3s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--correct);color:var(--correct);}
.toast.error{border-color:var(--wrong);color:var(--wrong);}

/* Congrats */
.congrats{text-align:center;padding:60px 20px;display:none;}
.congrats.show{display:block;animation:slideIn 0.5s ease;}
.congrats-emoji{font-size:72px;margin-bottom:16px;}
.congrats-title{font-family:'Bebas Neue',sans-serif;font-size:52px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;}

/* === SENTENCE LIST VIEW === */
.list-view{display:none;}
.list-view.show{display:block;animation:slideIn 0.3s ease;}
.list-search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;margin-bottom:16px;transition:border-color 0.2s;}
.list-search:focus{border-color:var(--accent);}
.list-stats-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.list-stat-chip{padding:5px 12px;border-radius:20px;font-size:11px;border:1px solid var(--border);color:var(--text-dim);}
.list-stat-chip.done{border-color:var(--correct);color:var(--correct);background:rgba(74,222,128,0.08);}
.sentence-list{display:flex;flex-direction:column;gap:6px;}
.list-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;cursor:pointer;transition:all 0.2s;display:flex;align-items:flex-start;gap:12px;}
.list-item:hover{border-color:var(--accent);background:var(--surface2);}
.list-item.mastered-item{border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.03);}
.list-num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text-dim);min-width:32px;line-height:1.2;}
.list-num.mastered-num{color:var(--correct);}
.list-content{flex:1;}
.list-en{font-family:'DM Mono',monospace;font-size:13px;color:var(--text);line-height:1.5;margin-bottom:4px;}
.list-ko{font-size:12px;color:var(--text-dim);}
.list-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(74,222,128,0.15);color:var(--correct);border:1px solid rgba(74,222,128,0.3);flex-shrink:0;align-self:center;}
.list-go-btn{font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.2s;flex-shrink:0;font-family:'DM Sans',sans-serif;}
.list-go-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Highlight search */
.hl{background:rgba(124,106,255,0.3);border-radius:2px;color:var(--text);}

@media(max-width:600px){.logo{font-size:32px}.quiz-card{padding:22px}.sentence-display{font-size:14px}.blank-input{font-size:14px}.mode-tab{font-size:11px;padding:7px 4px;}.score-card{gap:6px}.score-val{font-size:24px}}

  /* Wrong retry bar */
  .wrong-retry-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.3);border-radius:14px;padding:14px 20px;margin-bottom:18px;font-size:14px;color:var(--text);gap:12px;flex-wrap:wrap;}
  .retry-btn{padding:8px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--wrong),#ff6a9e);color:white;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
  .retry-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(248,113,113,0.4);}
  /* Keyword mode */
  .keyword-chips{display:flex;flex-wrap:wrap;gap:8px;padding:18px;background:var(--surface2);border-radius:14px;margin-bottom:20px;min-height:56px;}
  .kw-chip{padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text);cursor:pointer;transition:all 0.2s;user-select:none;}
  .kw-chip:hover{border-color:var(--accent);color:var(--accent);}
  .kw-chip.used{opacity:0.25;cursor:default;text-decoration:line-through;}
  .answer-slots{font-family:'DM Mono',monospace;font-size:16px;line-height:2;margin-bottom:20px;padding:16px;background:var(--surface2);border-radius:12px;min-height:56px;color:var(--text);word-break:break-word;}
  .slot-word{display:inline-block;background:rgba(124,106,255,0.15);border:1px solid var(--accent);border-radius:6px;padding:2px 8px;margin:2px;cursor:pointer;}
  .slot-word:hover{background:rgba(248,113,113,0.15);border-color:var(--wrong);}
  /* First letter mode */
  .first-letter-display{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:6px;color:var(--accent);padding:18px 20px;background:var(--surface2);border-radius:14px;margin-bottom:18px;line-height:1.8;word-break:break-all;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="logo">ENGLISH<span>MASTER</span></div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px;letter-spacing:1px;">211 ACADEMIC SENTENCES</div>
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-val" id="masteredCount">0</div><div class="stat-label">Mastered</div></div>
      <div class="stat"><div class="stat-val" id="streakCount">0</div><div class="stat-label">Streak 🔥</div></div>
    </div>
  </header>

  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- Top nav: Quiz / List -->
  <div class="top-nav">
    <button class="top-nav-btn active" onclick="switchView('quiz')">📝 퀴즈</button>
    <button class="top-nav-btn" onclick="switchView('list')">📋 전체 목록</button>
  </div>

  <!-- ====== QUIZ VIEW ====== -->
  <div id="quizView">
    <div class="memorized-grid" id="memorizedGrid"></div>
    <div class="score-card">
      <div class="score-item"><div class="score-val neutral" id="currentIdx">1</div><div class="score-label">Current</div></div>
      <div class="score-item"><div class="score-val good" id="correctCount">0</div><div class="score-label">Correct</div></div>
      <div class="score-item"><div class="score-val bad" id="wrongCount">0</div><div class="score-label">Wrong</div></div>
      <div class="score-item"><div class="score-val neutral" id="accuracyPct">—</div><div class="score-label">Accuracy</div></div>
    </div>

    <div class="settings-wrap">
      <span class="range-label">범위:</span>
      <input type="number" class="range-input" id="rangeStart" value="1" min="1" max="211">
      <span class="range-label">~</span>
      <input type="number" class="range-input" id="rangeEnd" value="211" min="1" max="211">
      <button class="btn btn-secondary" onclick="applyRange()" style="padding:7px 14px;font-size:12px;">적용</button>
      <label class="shuffle-toggle" style="margin-left:auto;">
        <input type="checkbox" id="shuffleCheck">
        <span class="toggle-switch"></span>
        <span>랜덤</span>
      </label>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('fillblank')">🎧 듣고 빈칸</button>
      <button class="mode-tab" onclick="setMode('keyword')">🔑 키워드 복원</button>
      <button class="mode-tab" onclick="setMode('firstletter')">🔤 첫 글자</button>
      <button class="mode-tab" onclick="setMode('meaning')">💡 뜻 보고 단어</button>
      <button class="mode-tab" onclick="setMode('dictation')">✍️ 받아쓰기</button>
      <button class="mode-tab" onclick="setMode('listen')">👂 전체 듣기</button>
    </div>
    <!-- 틀린 문장 재도전 배너 -->
    <div class="wrong-retry-bar" id="wrongRetryBar" style="display:none;">
      <span>❌ 틀린 문장 <strong id="wrongRetryCount">0</strong>개 있습니다</span>
      <button class="retry-btn" onclick="retryWrong()">🔥 틀린 것만 다시 풀기</button>
    </div>

    <div class="quiz-card" id="quizCard">
      <div class="sentence-num" id="sentenceNum">SENTENCE #1</div>
      <div class="tts-controls" id="ttsControls">
        <button class="play-btn" id="playBtn" onclick="playSentence()">▶</button>
        <div class="speed-controls">
          <button class="speed-btn active" onclick="setSpeed(0.7,this)">0.7×</button>
          <button class="speed-btn" onclick="setSpeed(1.0,this)">1.0×</button>
          <button class="speed-btn" onclick="setSpeed(1.2,this)">1.2×</button>
        </div>
        <button class="repeat-btn" id="repeatBtn" onclick="toggleRepeat()">🔁 반복</button>
      </div>
      <div class="korean-hint" id="koreanHint"></div>
      <div id="quizContent"></div>
    </div>

    <div class="congrats" id="congratsDiv">
      <div class="congrats-emoji">🎉</div>
      <div class="congrats-title">COMPLETE!</div>
      <p style="color:var(--text-dim);margin-bottom:8px;font-size:15px;">선택 범위를 모두 완주했습니다!</p>
      <p style="color:var(--text-dim);margin-bottom:24px;font-size:13px;" id="congratsDetail"></p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">

let wrongSet=new Set(); // tracks wrong sentence indices

// ============================================================
// VIEW SWITCH
// ============================================================
function switchView(v){
  currentView=v;
  document.getElementById('quizView').style.display=v==='quiz'?'block':'none';
  document.getElementById('listView').classList.toggle('show',v==='list');
  document.querySelectorAll('.top-nav-btn').forEach((b,i)=>b.classList.toggle('active',['quiz','list'][i]===v));
  if(v==='list') renderList();
}

// ============================================================
// QUEUE
// ============================================================
function buildQueue(){
  let i=[];for(let n=rangeStart;n<=rangeEnd;n++)i.push(n);
  if(shuffleMode)i=i.sort(()=>Math.random()-0.5);
  queue=i;queuePos=0;
}
function applyRange(){
  const sVal=parseInt(document.getElementById('rangeStart').value);
  const eVal=parseInt(document.getElementById('rangeEnd').value);
  // 입력값 검증: 1~216 범위로 클램프
  const sClamp=Math.max(1,Math.min(sVal,211));
  const eClamp=Math.max(sClamp,Math.min(eVal,211));
  // 화면 input도 보정된 값으로 업데이트
  document.getElementById('rangeStart').value=sClamp;
  document.getElementById('rangeEnd').value=eClamp;
  // 0-based index로 변환
  rangeStart=sClamp-1;
  rangeEnd=eClamp-1;
  document.getElementById('congratsDiv').classList.remove('show');
  document.getElementById('quizCard').style.display='block';
  buildQueue();
  loadCurrent();
}
document.getElementById('shuffleCheck').addEventListener('change',function(){shuffleMode=this.checked;buildQueue();loadCurrent();});

// ============================================================
// MODE
// ============================================================
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',['fillblank','keyword','firstletter','meaning','dictation','listen'][i]===mode));
  const ttsBar=document.getElementById('ttsControls');
  ttsBar.style.display=(mode==='meaning'||mode==='keyword'||mode==='firstletter')?'none':'flex';
  answered=false;loadCurrent();
}

// TTS
// ============================================================
function playSentence(text){
  if(!('speechSynthesis' in window)){showToast('TTS 미지원 브라우저','error');return;}
  window.speechSynthesis.cancel();
  const t=text||(currentSentence?currentSentence.en:'');if(!t)return;
  const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=ttsSpeed;u.pitch=1;
  const btn=document.getElementById('playBtn');btn.classList.add('playing');btn.textContent='⏸';
  u.onend=()=>{btn.classList.remove('playing');btn.textContent='▶';if(repeatMode&&currentMode==='listen')setTimeout(()=>playSentence(),800);};
  window.speechSynthesis.speak(u);
}
function setSpeed(s,el){ttsSpeed=s;document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
function toggleRepeat(){repeatMode=!repeatMode;document.getElementById('repeatBtn').classList.toggle('active',repeatMode);}

// FILL BLANK MODE
// ============================================================
function getBlankWords(sentence){
  const words=sentence.split(/\s+/);
  const cands=words.map((w,i)=>({w,i})).filter(({w})=>w.replace(/[^a-zA-Z]/g,'').length>=4);
  const count=Math.min(3,Math.max(1,Math.floor(cands.length*0.3)));
  const picked=[],used=new Set();let tries=0;
  while(picked.length<count&&tries<60){tries++;const r=cands[Math.floor(Math.random()*cands.length)];if(!used.has(r.i)){picked.push(r);used.add(r.i);}}
  return picked.sort((a,b)=>a.i-b.i);
}
function renderFillBlank(s){
  const bw=getBlankWords(s.en);const bi=new Set(bw.map(b=>b.i));
  const words=s.en.split(/\s+/);
  let html='<div class="sentence-display">';
  words.forEach((w,i)=>{
    if(bi.has(i)){
      const clean=w.replace(/[^a-zA-Z]/g,'');
      const pre=w.match(/^[^a-zA-Z]*/)[0],post=w.match(/[^a-zA-Z]*$/)[0];
      const sz=Math.max(80,clean.length*14);
      html+=`${pre}<input class="blank-input" data-idx="${i}" data-answer="${clean.toLowerCase()}" style="width:${sz}px" autocomplete="off" autocorrect="off" spellcheck="false">${post} `;
    }else html+=w+' ';
  });
  html+='</div>';
  html+='<div class="btn-row"><button class="btn btn-primary" onclick="checkFillBlank()">확인 ✓</button><button class="btn btn-secondary" onclick="showFillAnswer()">정답 보기</button></div>';
  html+='<div class="result-display" id="fillResult"></div>';
  document.getElementById('quizContent').innerHTML=html;
  document.querySelectorAll('.blank-input').forEach(inp=>inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkFillBlank();}));
  setTimeout(()=>playSentence(),400);
}
function checkFillBlank(){
  if(answered)return;
  const inputs=document.querySelectorAll('.blank-input');
  let allOk=true,anyFilled=false;
  inputs.forEach(inp=>{
    const v=inp.value.trim().toLowerCase().replace(/[^a-z]/g,'');
    const a=inp.dataset.answer.replace(/[^a-z]/g,'');
    if(v)anyFilled=true;
    if(v===a){inp.classList.add('correct');inp.classList.remove('wrong');}
    else{inp.classList.add('wrong');inp.classList.remove('correct');allOk=false;}
  });
  if(!anyFilled){showToast('단어를 입력해주세요!');return;}
  answered=true;
  const r=document.getElementById('fillResult');
  if(allOk){correctCount++;streak++;r.className='result-display show correct-result';r.innerHTML='🎉 정답! '+currentSentence.en+'<br><br><button class="btn btn-primary" style="margin-top:4px" onclick="nextSentence()">다음 문장 →</button>';updateMastery(true);showToast('정답! 🔥','success');}
  else{wrongCount++;streak=0;r.className='result-display show wrong-result';r.innerHTML='❌ 정답: <span class="answer-highlight">'+currentSentence.en+'</span>';updateMastery(false);showToast('틀렸습니다!','error');}
  updateStats();
}
function showFillAnswer(){
  document.querySelectorAll('.blank-input').forEach(inp=>{inp.value=inp.dataset.answer;inp.classList.add('correct');});
  const r=document.getElementById('fillResult');r.className='result-display show wrong-result';
  r.innerHTML='💡 정답: <span class="answer-highlight">'+currentSentence.en+'</span>';
  answered=true;wrongCount++;streak=0;updateMastery(false);updateStats();
}

function renderDictation(s){
  let html='<p style="color:var(--text-dim);font-size:12px;margin-bottom:10px;">🎧 문장을 듣고 받아 적어보세요</p>';
  html+='<textarea class="dictation-area" id="dictArea" placeholder="들은 문장을 그대로 입력하세요..." rows="2"></textarea>';
  html+='<div style="height:10px"></div>';
  html+='<div class="btn-row"><button class="btn btn-primary" onclick="checkDictation()">제출 ✓</button><button class="btn btn-secondary" onclick="playSentence()">🔊 다시 듣기</button><button class="btn btn-ghost" onclick="showDictAnswer()">정답 보기</button></div>';
  html+='<div class="result-display" id="dictResult"></div>';
  document.getElementById('quizContent').innerHTML=html;
  document.getElementById('dictArea').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();checkDictation();}});
  setTimeout(()=>playSentence(),300);
}
function norm(s){return s.toLowerCase().replace(/[^a-z\s]/g,'').replace(/\s+/g,' ').trim();}
function checkDictation(){
  if(answered)return;
  const area=document.getElementById('dictArea');const ut=area.value.trim();
  if(!ut){showToast('문장을 입력해주세요!');return;}
  const cW=norm(currentSentence.en).split(' ');const uW=norm(ut).split(' ');
  let match=0,diffHtml='';
  for(let i=0;i<cW.length;i++){
    if(uW[i]===cW[i]){diffHtml+=`<span class="diff-correct">${cW[i]}</span> `;match++;}
    else if(uW[i]){diffHtml+=`<span class="diff-wrong">${uW[i]}</span><span class="diff-correct">${cW[i]}</span> `;}
    else{diffHtml+=`<span class="diff-correct">[${cW[i]}]</span> `;}
  }
  const pct=Math.round(match/cW.length*100);answered=true;
  const r=document.getElementById('dictResult');
  if(pct===100){correctCount++;streak++;area.classList.add('correct');r.className='result-display show correct-result';r.innerHTML=`🎉 완벽! (${pct}%)<br>${diffHtml}<br><button class="btn btn-primary" style="margin-top:8px" onclick="nextSentence()">다음 문장 →</button>`;updateMastery(true);showToast('완벽합니다! 🔥','success');}
  else{wrongCount++;streak=0;area.classList.add('wrong');r.className='result-display show wrong-result';r.innerHTML=`📊 ${pct}% 일치<br>${diffHtml}`;updateMastery(pct>=70);showToast(`${pct}% 정확도`,pct>=70?'':'error');}
  updateStats();
}
function showDictAnswer(){
  const r=document.getElementById('dictResult');r.className='result-display show wrong-result';
  r.innerHTML='💡 정답: <span class="answer-highlight">'+currentSentence.en+'</span>';
  const a=document.getElementById('dictArea');if(a)a.classList.add('wrong');
  answered=true;wrongCount++;streak=0;updateMastery(false);updateStats();
}

function loadCurrent(){
  if(!queue.length) return;
  // queuePos가 범위를 벗어나면 마지막 문장으로 클램프 (모드 전환 등 안전 처리)
  if(queuePos>=queue.length) queuePos=queue.length-1;
  if(queuePos<0) queuePos=0;
  document.getElementById('congratsDiv').classList.remove('show');
  document.getElementById('quizCard').style.display='block';
  document.getElementById('congratsDiv').classList.remove('show');
  const idx=queue[queuePos];currentSentence=SENTENCES[idx];answered=false;hintVisible=false;
  document.getElementById('sentenceNum').textContent=`SENTENCE #${idx+1} — ${queuePos+1}/${queue.length}`;
  document.getElementById('koreanHint').className='korean-hint';
  document.getElementById('koreanHint').textContent=currentSentence.ko;
  document.getElementById('currentIdx').textContent=idx+1;
  const ttsBar=document.getElementById('ttsControls');
  ttsBar.style.display=(currentMode==='meaning'||currentMode==='keyword'||currentMode==='firstletter')?'none':'flex';
  if(currentMode==='fillblank')renderFillBlank(currentSentence);
  else if(currentMode==='keyword')renderKeyword(currentSentence);
  else if(currentMode==='firstletter')renderFirstLetter(currentSentence);
  else if(currentMode==='meaning')renderMeaning(currentSentence);
  else if(currentMode==='dictation')renderDictation(currentSentence);
  else renderListenMode(currentSentence);
  updateDots();updateStats();
}
function nextSentence(){
  queuePos++;
  if(queuePos>=queue.length){
    showComplete();
    return;
  }
  loadCurrent();
}
function showComplete(){
  document.getElementById('quizCard').style.display='none';
  document.getElementById('congratsDiv').classList.add('show');
  const det=document.getElementById('congratsDetail');
  if(det){
    const acc=correctCount+wrongCount>0?Math.round(correctCount/(correctCount+wrongCount)*100):0;
    // queue[0]이 실제 시작 문장 인덱스, queue[queue.length-1]이 끝
    const startNum=queue[0]+1;
    const endNum=queue[queue.length-1]+1;
    det.textContent=`범위: ${startNum}~${endNum}번 (${queue.length}문장) · 정답률 ${acc}% · 연속 ${streak}개`;
  }
  updateStats();
}
function skipSentence(){
  if(queuePos>=queue.length-1){
    // 마지막 문장에서 건너뛰기 = 완료 처리
    nextSentence();
  } else {
    queuePos++;
    loadCurrent();
  }
}
function prevSentence(){if(queuePos>0){queuePos--;loadCurrent();}}
function toggleHint(){hintVisible=!hintVisible;document.getElementById('koreanHint').classList.toggle('show',hintVisible);}
function updateMastery(ok){
  const idx=queue[queuePos];
  if(ok){mastered.add(idx);wrongSet.delete(idx);}
  else{wrongSet.add(idx);}
  updateRetryBar();
}
function updateRetryBar(){
  const bar=document.getElementById('wrongRetryBar');
  const cnt=document.getElementById('wrongRetryCount');
  if(wrongSet.size>0){bar.style.display='flex';cnt.textContent=wrongSet.size;}
  else{bar.style.display='none';}
}
function retryWrong(){
  if(wrongSet.size===0){showToast('틀린 문장이 없어요! 👍','success');return;}
  queue=[...wrongSet].sort((a,b)=>a-b);

function goToSentence(idx){
  switchView('quiz');

  const pos=queue.indexOf(idx);
  if(pos>=0){queuePos=pos;}
  else{
    // insert at current position cleanly
    queue=[...queue.slice(0,queuePos),idx,...queue.slice(queuePos)];
  }
  loadCurrent();
}

// KEYWORD RESTORE MODE
// ============================================================
let kwUserWords=[];
function renderKeyword(s){
  // Extract key words (longer words, skip articles/prepositions)
  const stopwords=new Set(['the','a','an','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','shall','should','may','might','must','can','could','to','of','in','on','at','by','for','with','about','as','from','and','or','but','not','it','its','this','that','these','those']);
  const words=s.en.split(/\s+/);
  // Pick 4-6 key words (longer & not stopwords)
  const candidates=words.filter(w=>{const c=w.replace(/[^a-zA-Z]/g,'');return c.length>=4&&!stopwords.has(c.toLowerCase());});
  // shuffle and pick up to 5
  const shuffled=[...candidates].sort(()=>Math.random()-0.5).slice(0,Math.min(5,candidates.length));
  // Also always include ALL words shuffled for reconstruction
  const allShuffled=[...words].sort(()=>Math.random()-0.5);
  kwUserWords=[];

  let html='';
  html+=`<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;letter-spacing:1px;">🔑 아래 단어 힌트를 보고 전체 문장을 완성하세요</div>`;
  // Show key word chips as hints
  html+=`<div style="margin-bottom:14px;"><span style="font-size:11px;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;">키워드 힌트</span><div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">`;
  shuffled.forEach(w=>{
    const clean=w.replace(/[^a-zA-Z]/g,'');
    html+=`<span style="padding:5px 12px;background:rgba(255,106,158,0.1);border:1px solid rgba(255,106,158,0.4);border-radius:16px;font-family:'DM Mono',monospace;font-size:13px;color:var(--accent2);">${clean}</span>`;
  });
  html+='</div></div>';
  // Word bank (all words shuffled)
  html+='<div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;letter-spacing:1px;">단어 뱅크 (클릭해서 문장 완성)</div>';
  html+='<div class="keyword-chips" id="kwChips">';
  allShuffled.forEach((w,i)=>{
    html+=`<span class="kw-chip" data-word="${w}" data-idx="${i}" onclick="kwClick(this)">${w}</span>`;
  });
  html+='</div>';
  html+='<div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;letter-spacing:1px;">완성된 문장 (클릭하면 취소)</div>';
  html+='<div class="answer-slots" id="kwSlots"><span style="color:var(--text-dim);font-size:14px;">여기에 단어가 쌓입니다...</span></div>';
  html+='<div class="btn-row">';
  html+='<button class="btn btn-primary" onclick="checkKeyword()">확인 ✓</button>';
  html+='<button class="btn btn-secondary" onclick="kwClear()">전체 지우기</button>';
  html+='<button class="btn btn-ghost" onclick="showKwAnswer()">정답 보기</button>';
  html+='</div>';
  html+='<div class="result-display" id="kwResult"></div>';
  document.getElementById('quizContent').innerHTML=html;
}
function kwClick(el){
  if(el.classList.contains('used'))return;
  el.classList.add('used');
  const w=el.dataset.word;
  kwUserWords.push({word:w,chipEl:el});
  renderKwSlots();
}
function renderKwSlots(){
  const slots=document.getElementById('kwSlots');
  if(!kwUserWords.length){slots.innerHTML='<span style="color:var(--text-dim);font-size:14px;">여기에 단어가 쌓입니다...</span>';return;}
  slots.innerHTML=kwUserWords.map((item,i)=>`<span class="slot-word" onclick="kwRemove(${i})">${item.word}</span>`).join(' ');
}
function kwRemove(i){
  const item=kwUserWords.splice(i,1)[0];
  item.chipEl.classList.remove('used');
  renderKwSlots();
}
function kwClear(){
  kwUserWords=[];
  document.querySelectorAll('.kw-chip').forEach(el=>el.classList.remove('used'));
  renderKwSlots();
}
function checkKeyword(){
  if(answered)return;
  const userSentence=kwUserWords.map(x=>x.word).join(' ');
  if(!userSentence.trim()){showToast('단어를 선택해주세요!');return;}
  const correct=currentSentence.en;
  const norm=s=>s.toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
  const r=document.getElementById('kwResult');
  answered=true;
  if(norm(userSentence)===norm(correct)){
    correctCount++;streak++;
    r.className='result-display show correct-result';
    r.innerHTML='🎉 완벽합니다!<br><button class="btn btn-primary" style="margin-top:8px" onclick="nextSentence()">다음 문장 →</button>';
    updateMastery(true);showToast('정답! 🔥','success');
  }else{
    wrongCount++;streak=0;
    // word-level diff
    const cw=norm(correct).split(' ');const uw=norm(userSentence).split(' ');
    let diff='';
    for(let i=0;i<Math.max(cw.length,uw.length);i++){
      if(uw[i]===cw[i])diff+=`<span class="diff-correct">${cw[i]||''}</span> `;
      else if(uw[i]&&cw[i])diff+=`<span class="diff-wrong">${uw[i]}</span><span class="diff-correct">${cw[i]}</span> `;
      else if(cw[i])diff+=`<span class="diff-correct">[${cw[i]}]</span> `;
    }
    r.className='result-display show wrong-result';
    r.innerHTML=`❌ 정답:<br><span class="answer-highlight">${correct}</span><br><br>${diff}`;
    updateMastery(false);showToast('틀렸습니다!','error');
  }
  updateStats();
}
function showKwAnswer(){
  const r=document.getElementById('kwResult');
  r.className='result-display show wrong-result';
  r.innerHTML='💡 정답: <span class="answer-highlight">'+currentSentence.en+'</span>';
  answered=true;wrongCount++;streak=0;updateMastery(false);updateStats();
}

// ============================================================
// FIRST LETTER MODE
// ============================================================
function renderFirstLetter(s){
  // Build first-letter string
  const words=s.en.split(/\s+/);
  const fl=words.map(w=>{
    const c=w.replace(/[^a-zA-Z]/g,'');
    const pre=w.match(/^[^a-zA-Z]*/)[0];
    const post=w.match(/[^a-zA-Z]*$/)[0];
    return pre+(c[0]||'')+'_'.repeat(Math.max(0,c.length-1))+post;
  }).join(' ');

  let html='';
  html+=`<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;letter-spacing:1px;">🔤 첫 글자를 보고 전체 문장을 떠올려 보세요</div>`;
  html+=`<div class="first-letter-display">${fl}</div>`;
  html+=`<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;">💬 문장을 입력하세요 (대소문자 무시)</div>`;
  html+=`<textarea class="dictation-area" id="flInput" placeholder="전체 문장을 입력하세요..." rows="2" spellcheck="false"></textarea>`;
  html+=`<div style="height:10px"></div>`;
  html+=`<div class="btn-row">`;
  html+=`<button class="btn btn-primary" onclick="checkFirstLetter()">확인 ✓</button>`;
  html+=`<button class="btn btn-secondary" onclick="playSentence()">🔊 듣기</button>`;
  html+=`<button class="btn btn-ghost" onclick="showFlAnswer()">정답 보기</button>`;
  html+=`</div>`;
  html+=`<div class="result-display" id="flResult"></div>`;
  document.getElementById('quizContent').innerHTML=html;
  document.getElementById('flInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();checkFirstLetter();}});
  document.getElementById('flInput').focus();
}
function checkFirstLetter(){
  if(answered)return;
  const inp=document.getElementById('flInput');
  const ut=inp.value.trim();
  if(!ut){showToast('문장을 입력해주세요!');return;}
  const cW=currentSentence.en.toLowerCase().replace(/[^a-z\s]/g,'').replace(/\s+/g,' ').trim().split(' ');
  const uW=ut.toLowerCase().replace(/[^a-z\s]/g,'').replace(/\s+/g,' ').trim().split(' ');
  let match=0;
  let diffHtml='';
  for(let i=0;i<cW.length;i++){
    if(uW[i]===cW[i]){diffHtml+=`<span class="diff-correct">${cW[i]}</span> `;match++;}
    else if(uW[i]){diffHtml+=`<span class="diff-wrong">${uW[i]}</span><span class="diff-correct">${cW[i]}</span> `;}
    else{diffHtml+=`<span class="diff-correct">[${cW[i]}]</span> `;}
  }
  const pct=Math.round(match/cW.length*100);
  answered=true;
  const r=document.getElementById('flResult');
  if(pct===100){
    correctCount++;streak++;inp.classList.add('correct');
    r.className='result-display show correct-result';
    r.innerHTML=`🎉 완벽! ${pct}%<br>${diffHtml}<br><button class="btn btn-primary" style="margin-top:8px" onclick="nextSentence()">다음 문장 →</button>`;
    updateMastery(true);showToast('완벽합니다! 🔥','success');
  }else{
    wrongCount++;streak=0;inp.classList.add('wrong');
    r.className='result-display show wrong-result';
    r.innerHTML=`📊 ${pct}% 일치<br>${diffHtml}`;
    updateMastery(pct>=70);showToast(`${pct}% 정확도`,pct>=70?'':'error');
  }
  updateStats();
}
function showFlAnswer(){
  const r=document.getElementById('flResult');
  r.className='result-display show wrong-result';
  r.innerHTML='💡 정답: <span class="answer-highlight">'+currentSentence.en+'</span>';
  const inp=document.getElementById('flInput');if(inp)inp.classList.add('wrong');
  answered=true;wrongCount++;streak=0;updateMastery(false);updateStats();
}

buildQueue();
loadCurrent();
