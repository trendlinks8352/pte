<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master — 230 Sentences</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --accent3: #6affda;
    --text: #e8e8f0;
    --text-dim: #7a7a9a;
    --correct: #4ade80;
    --wrong: #f87171;
    --warn: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  body::after { content:''; position:fixed; top:-30%; left:50%; transform:translateX(-50%); width:60vw; height:60vw; background:radial-gradient(ellipse, rgba(124,106,255,0.08) 0%, transparent 70%); pointer-events:none; z-index:0; }
  .app { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:0 20px 80px; }
  header { padding:40px 0 30px; display:flex; align-items:flex-end; justify-content:space-between; border-bottom:1px solid var(--border); margin-bottom:32px; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:48px; letter-spacing:2px; background:linear-gradient(135deg,#7c6aff,#ff6a9e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
  .logo span { color:var(--accent3); -webkit-text-fill-color:var(--accent3); }
  .stats-bar { display:flex; gap:20px; }
  .stat { text-align:right; line-height:1.2; }
  .stat-val { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--accent); }
  .stat-label { font-size:11px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; }
  .progress-track { height:3px; background:var(--surface2); border-radius:2px; margin-bottom:28px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; transition:width 0.5s; }
  .mode-tabs { display:flex; gap:8px; margin-bottom:28px; background:var(--surface); padding:6px; border-radius:14px; border:1px solid var(--border); }
  .mode-tab { flex:1; padding:10px; border:none; border-radius:10px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; transition:all 0.2s; background:transparent; color:var(--text-dim); }
  .mode-tab.active { background:var(--accent); color:white; box-shadow:0 4px 20px rgba(124,106,255,0.4); }
  .mode-tab:hover:not(.active) { color:var(--text); background:var(--surface2); }
  .quiz-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:36px; margin-bottom:20px; position:relative; overflow:hidden; animation:slideIn 0.35s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .quiz-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3)); }
  .sentence-num { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:2px; color:var(--accent); margin-bottom:20px; display:flex; align-items:center; gap:10px; }
  .sentence-num::after { content:''; flex:1; height:1px; background:var(--border); }
  .tts-controls { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
  .play-btn { width:52px; height:52px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 4px 20px rgba(124,106,255,0.4); transition:all 0.2s; font-size:20px; flex-shrink:0; }
  .play-btn:hover { transform:scale(1.08); }
  .play-btn.playing { animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 4px 20px rgba(124,106,255,0.4)} 50%{box-shadow:0 4px 30px rgba(124,106,255,0.8)} }
  .speed-controls { display:flex; gap:6px; }
  .speed-btn { padding:6px 12px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-size:12px; font-family:'DM Mono',monospace; cursor:pointer; transition:all 0.2s; }
  .speed-btn.active { border-color:var(--accent3); color:var(--accent3); background:rgba(106,255,218,0.08); }
  .repeat-btn { padding:6px 12px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-size:12px; cursor:pointer; transition:all 0.2s; margin-left:auto; }
  .repeat-btn.active { border-color:var(--warn); color:var(--warn); background:rgba(251,191,36,0.08); }
  .korean-hint { font-size:14px; color:var(--text-dim); margin-bottom:20px; padding:12px 16px; background:var(--surface2); border-radius:10px; border-left:3px solid var(--accent); display:none; }
  .korean-hint.show { display:block; }
  .sentence-display { font-family:'DM Mono',monospace; font-size:18px; line-height:2.2; margin-bottom:24px; word-break:break-word; }
  .blank-input { display:inline-block; min-width:100px; border-bottom:2px solid var(--accent); background:rgba(124,106,255,0.08); border-radius:6px 6px 0 0; padding:2px 8px; font-family:'DM Mono',monospace; font-size:18px; color:var(--text); outline:none; transition:all 0.2s; vertical-align:baseline; }
  .blank-input:focus { border-color:var(--accent2); background:rgba(255,106,158,0.08); }
  .blank-input.correct { border-color:var(--correct); background:rgba(74,222,128,0.1); color:var(--correct); }
  .blank-input.wrong { border-color:var(--wrong); background:rgba(248,113,113,0.1); color:var(--wrong); }
  .dictation-area { width:100%; background:var(--surface2); border:2px solid var(--border); border-radius:14px; padding:16px 20px; font-family:'DM Mono',monospace; font-size:16px; color:var(--text); resize:none; outline:none; min-height:80px; transition:border-color 0.2s; line-height:1.6; }
  .dictation-area:focus { border-color:var(--accent); }
  .dictation-area.correct { border-color:var(--correct); }
  .dictation-area.wrong { border-color:var(--wrong); }
  .result-display { margin-top:16px; padding:14px 18px; border-radius:12px; font-size:14px; display:none; line-height:1.8; }
  .result-display.show { display:block; animation:fadeIn 0.3s; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .result-display.correct-result { background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.3); color:var(--correct); }
  .result-display.wrong-result { background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.3); color:var(--text); }
  .answer-highlight { color:var(--correct); font-weight:600; }
  .diff-wrong { color:var(--wrong); text-decoration:line-through; }
  .diff-correct { color:var(--correct); }
  .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
  .btn { padding:12px 24px; border-radius:12px; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; transition:all 0.2s; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; box-shadow:0 4px 16px rgba(124,106,255,0.3); }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(124,106,255,0.5); }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .btn-ghost { background:transparent; color:var(--text-dim); border:1px solid transparent; }
  .btn-ghost:hover { color:var(--text); border-color:var(--border); }
  .nav-row { display:flex; justify-content:space-between; align-items:center; margin-top:16px; }
  .hint-toggle { background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:8px 14px; border-radius:8px; font-size:12px; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
  .hint-toggle:hover { border-color:var(--warn); color:var(--warn); }
  .sentence-select-wrap { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:20px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .range-label { font-size:13px; color:var(--text-dim); white-space:nowrap; }
  .range-input { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:8px 12px; font-family:'DM Mono',monospace; font-size:14px; width:80px; outline:none; }
  .range-input:focus { border-color:var(--accent); }
  .shuffle-toggle { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:var(--text-dim); }
  .toggle-switch { width:36px; height:20px; background:var(--surface2); border-radius:10px; position:relative; border:1px solid var(--border); transition:background 0.2s; }
  .toggle-switch::after { content:''; position:absolute; width:14px; height:14px; background:var(--text-dim); border-radius:50%; top:2px; left:2px; transition:all 0.2s; }
  input[type="checkbox"]:checked + .toggle-switch { background:var(--accent); border-color:var(--accent); }
  input[type="checkbox"]:checked + .toggle-switch::after { left:18px; background:white; }
  input[type="checkbox"] { display:none; }
  .score-card { display:flex; gap:12px; margin-bottom:20px; }
  .score-item { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; text-align:center; }
  .score-val { font-family:'Bebas Neue',sans-serif; font-size:32px; line-height:1; }
  .score-val.good { color:var(--correct); }
  .score-val.bad { color:var(--wrong); }
  .score-val.neutral { color:var(--accent); }
  .score-label { font-size:11px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }
  .memorized-grid { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:20px; }
  .mem-dot { width:10px; height:10px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); transition:all 0.3s; cursor:pointer; }
  .mem-dot.done { background:var(--correct); border-color:var(--correct); }
  .mem-dot.current { background:var(--accent); border-color:var(--accent); animation:pulse 1s infinite; }
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 24px; font-size:14px; z-index:100; transition:transform 0.3s; white-space:nowrap; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:var(--correct); color:var(--correct); }
  .toast.error { border-color:var(--wrong); color:var(--wrong); }
  .congrats { text-align:center; padding:60px 20px; display:none; }
  .congrats.show { display:block; animation:slideIn 0.5s ease; }
  .congrats-emoji { font-size:80px; margin-bottom:20px; }
  .congrats-title { font-family:'Bebas Neue',sans-serif; font-size:56px; background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:12px; }
  @media(max-width:600px){ .logo{font-size:36px} .quiz-card{padding:24px} .sentence-display{font-size:15px} .blank-input{font-size:15px} }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="logo">ENGLISH<span>MASTER</span></div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:4px;letter-spacing:1px;">230 ACADEMIC SENTENCES</div>
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-val" id="masteredCount">0</div><div class="stat-label">Mastered</div></div>
      <div class="stat"><div class="stat-val" id="streakCount">0</div><div class="stat-label">Streak 🔥</div></div>
    </div>
  </header>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="memorized-grid" id="memorizedGrid"></div>
  <div class="score-card">
    <div class="score-item"><div class="score-val neutral" id="currentIdx">1</div><div class="score-label">Current #</div></div>
    <div class="score-item"><div class="score-val good" id="correctCount">0</div><div class="score-label">Correct</div></div>
    <div class="score-item"><div class="score-val bad" id="wrongCount">0</div><div class="score-label">Wrong</div></div>
    <div class="score-item"><div class="score-val neutral" id="accuracyPct">—</div><div class="score-label">Accuracy</div></div>
  </div>
  <div class="sentence-select-wrap">
    <span class="range-label">문장 범위:</span>
    <input type="number" class="range-input" id="rangeStart" value="1" min="1" max="230">
    <span class="range-label">~</span>
    <input type="number" class="range-input" id="rangeEnd" value="230" min="1" max="230">
    <button class="btn btn-secondary" onclick="applyRange()" style="padding:8px 16px;font-size:13px;">적용</button>
    <label class="shuffle-toggle" style="margin-left:auto;">
      <input type="checkbox" id="shuffleCheck">
      <span class="toggle-switch"></span>
      <span>랜덤</span>
    </label>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('fillblank')">빈칸 채우기</button>
    <button class="mode-tab" onclick="setMode('dictation')">받아쓰기</button>
    <button class="mode-tab" onclick="setMode('listen')">전체 듣기</button>
  </div>
  <div class="quiz-card" id="quizCard">
    <div class="sentence-num" id="sentenceNum">SENTENCE #1</div>
    <div class="tts-controls">
      <button class="play-btn" id="playBtn" onclick="playSentence()">▶</button>
      <div class="speed-controls">
        <button class="speed-btn active" onclick="setSpeed(0.7,this)">0.7×</button>
        <button class="speed-btn" onclick="setSpeed(1.0,this)">1.0×</button>
        <button class="speed-btn" onclick="setSpeed(1.2,this)">1.2×</button>
      </div>
      <button class="repeat-btn" id="repeatBtn" onclick="toggleRepeat()">🔁 반복</button>
    </div>
    <div class="korean-hint" id="koreanHint"></div>
    <div id="quizContent"></div>
  </div>
  <div class="congrats" id="congratsDiv">
    <div class="congrats-emoji">🎉</div>
    <div class="congrats-title">COMPLETE!</div>
    <p style="color:var(--text-dim);margin-bottom:24px;font-size:16px;">모든 문장을 완주했습니다!</p>
    <button class="btn btn-primary" onclick="restartAll()">처음부터 다시</button>
  </div>
  <div class="nav-row">
    <button class="btn btn-ghost" onclick="prevSentence()">← 이전</button>
    <button class="hint-toggle" onclick="toggleHint()">🇰🇷 한국어 힌트</button>
    <button class="btn btn-ghost" onclick="skipSentence()">건너뛰기 →</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SENTENCES=[{en:"The celebrated theory is still the source of great controversy.",ko:"이 유명한 이론은 여전히 큰 논란의 대상이 되고 있습니다."},{en:"A good architectural structure should be useful, durable and beautiful.",ko:"좋은 건축 구조는 유용하고 내구성이 뛰어나며 아름다워야 합니다."},{en:"A group meeting will be held tomorrow in the library conference room.",ko:"내일 도서관 회의실에서 그룹 회의가 열립니다."},{en:"Educational level is found to be related to social and economic background.",ko:"교육 수준은 사회적, 경제적 배경과 관련이 있는 것으로 나타났습니다."},{en:"Tutorials are scheduled in the final week of the term.",ko:"튜토리얼은 학기 마지막 주에 예정되어 있습니다."},{en:"All dissertations must be accompanied by a submission form.",ko:"모든 논문에는 제출 양식이 첨부되어야 합니다."},{en:"All of the assignments must be submitted in person to the faculty office.",ko:"모든 과제는 교직원 사무실에 직접 제출해야 합니다."},{en:"The toughest part of postgraduate education is funding.",ko:"대학원 교육에서 가장 어려운 부분은 자금 조달입니다."},{en:"Our view is that educational reforms have been inadequately implemented.",ko:"우리의 견해는 교육 개혁이 부적절하게 시행되었다는 것입니다."},{en:"An introduction is an essential element of presentation.",ko:"소개는 프레젠테이션의 필수 요소입니다."},{en:"The assignments should be submitted to the department office before the deadlines.",ko:"과제는 마감일 전에 부서 사무실에 제출해야 합니다."},{en:"Before attending classes, you must register online or by post.",ko:"수업에 참석하기 전에 온라인 또는 우편으로 등록해야 합니다."},{en:"Certain scientific principles must be learned verbally or by logical deduction.",ko:"특정 과학 원리는 구두로 또는 논리적 추론을 통해 학습해야 합니다."},{en:"Daily practice can build confidence and improve skills.",ko:"매일 연습하면 자신감을 키우고 기술을 향상시킬 수 있습니다."},{en:"At that time, few people moved from towns to villages.",ko:"당시에는 마을에서 마을로 이사하는 사람이 거의 없었습니다."},{en:"Human beings compete with other living things for resources and space.",ko:"인간은 자원과 공간을 놓고 다른 생명체와 경쟁합니다."},{en:"Good research delivers practical benefits for real people.",ko:"좋은 연구는 실제 사람들에게 실질적인 혜택을 제공합니다."},{en:"He landed a job in a very prestigious law firm.",ko:"그는 매우 명망 있는 로펌에 취직했습니다."},{en:"The lecture is about the reasons for the financial crisis.",ko:"강의는 금융 위기의 원인에 관한 것입니다."},{en:"I thought it was through the small meeting room.",ko:"작은 회의실을 통해서인 줄 알았습니다."},{en:"If finance is a cause of concern, scholarships may be available.",ko:"재정적인 문제가 우려되는 경우 장학금을 받을 수 있습니다."},{en:"If you need additional help, visit the student resource center.",ko:"추가 도움이 필요하면 학생 리소스 센터를 방문하세요."},{en:"Important details from the argument are missing in the summary.",ko:"주장의 중요한 세부 사항이 요약에 누락되어 있습니다."},{en:"It may not be possible to solve the problem easily.",ko:"문제를 쉽게 해결하지 못할 수도 있습니다."},{en:"Library reference desks hold a lot of materials on academic history.",ko:"도서관 자료실에는 학술 역사에 관한 많은 자료가 있습니다."},{en:"Listening is the key skill needed to succeed in this course.",ko:"경청은 이 과정에서 성공하는 데 필요한 핵심 기술입니다."},{en:"Medical researchers have focused on causes of diseases and treatments.",ko:"의학 연구자들은 질병의 원인과 치료법에 집중해 왔습니다."},{en:"Mutually exclusive events can be described as either complementary or opposite.",ko:"상호 배타적인 이벤트는 상호 보완적이거나 반대되는 것으로 설명할 수 있습니다."},{en:"Organizational failure is considered from various perspectives in academic literature.",ko:"조직의 실패는 학술 문헌에서 다양한 관점에서 고려됩니다."},{en:"Our professor is hosting the business development conference.",ko:"우리 교수님이 비즈니스 개발 컨퍼런스를 주최하고 계십니다."},{en:"Plants are the living things that can grow on land or in water.",ko:"식물은 육지나 물에서 자랄 수 있는 생명체입니다."},{en:"Please make sure you have correctly cited all the necessary materials.",ko:"필요한 모든 자료를 올바르게 인용했는지 확인하세요."},{en:"Public perception about biotechnology is crucial for developing scientific consensus.",ko:"생명공학에 대한 대중의 인식은 과학적 공감대를 형성하는 데 매우 중요합니다."},{en:"Remember to sign the attendance register before leaving the lecture hall.",ko:"강의실을 떠나기 전에 출석부에 서명하는 것을 잊지 마세요."},{en:"Remember, the prestigious election of stewardship has strict eligibility criteria.",ko:"기억하세요, 권위 있는 지도자 선출은 엄격한 자격 기준이 있습니다."},{en:"Resources and materials are on hold at the library reference desk.",ko:"리소스와 자료는 도서관 참고 데스크에 보관되어 있습니다."},{en:"Many departments h y scientists.",ko:"기후 변화는 과학자들도 인정하는 치열한 현상입니다."},{en:"Safety is the most important in the biology lab.",ko:"생물학 연구실에서는 안전이 가장 중요합니다."},{en:"The essay assignments are given in the midterm and final exams.",ko:"에세이 과제는 중간고사 및 기말고사에서 주어집니다."},{en:"The next lecture will take place at a different location.",ko:"다음 강의는 다른 장소에서 열립니다."}];

let currentMode='fillblank',queue=[],queuePos=0,currentSentence=null,correctCount=0,wrongCount=0,streak=0,mastered=new Set(),answered=false,ttsSpeed=0.7,repeatMode=false,hintVisible=false,rangeStart=0,rangeEnd=229,shuffleMode=false,blankWords=[];

function buildQueue(){let i=[];for(let n=rangeStart;n<=rangeEnd;n++)i.push(n);if(shuffleMode)i=i.sort(()=>Math.random()-0.5);queue=i;queuePos=0;}
function applyRange(){const s=parseInt(document.getElementById('rangeStart').value)-1,e=parseInt(document.getElementById('rangeEnd').value)-1;rangeStart=Math.max(0,Math.min(s,229));rangeEnd=Math.max(rangeStart,Math.min(e,229));buildQueue();loadCurrent();}
document.getElementById('shuffleCheck').addEventListener('change',function(){shuffleMode=this.checked;buildQueue();loadCurrent();});

function setMode(mode){currentMode=mode;document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',['fillblank','dictation','listen'][i]===mode));answered=false;loadCurrent();}

function playSentence(text){
  if(!('speechSynthesis' in window)){showToast('TTS 미지원 브라우저','error');return;}
  window.speechSynthesis.cancel();
  const t=text||(currentSentence?currentSentence.en:'');
  if(!t)return;
  const u=new SpeechSynthesisUtterance(t);
  u.lang='en-US';u.rate=ttsSpeed;u.pitch=1;
  const btn=document.getElementById('playBtn');
  btn.classList.add('playing');btn.textContent='⏸';
  u.onend=()=>{btn.classList.remove('playing');btn.textContent='▶';if(repeatMode&&currentMode==='listen')setTimeout(()=>playSentence(),800);};
  window.speechSynthesis.speak(u);
}

function setSpeed(s,el){ttsSpeed=s;document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
function toggleRepeat(){repeatMode=!repeatMode;document.getElementById('repeatBtn').classList.toggle('active',repeatMode);}

function getBlankWords(sentence){
  const words=sentence.split(/\s+/);
  const cands=words.map((w,i)=>({w,i})).filter(({w})=>w.replace(/[^a-zA-Z]/g,'').length>=4);
  const count=Math.min(3,Math.max(1,Math.floor(cands.length*0.3)));
  const picked=[],used=new Set();
  let tries=0;
  while(picked.length<count&&tries<50){tries++;const r=cands[Math.floor(Math.random()*cands.length)];if(!used.has(r.i)){picked.push(r);used.add(r.i);}}
  return picked.sort((a,b)=>a.i-b.i);
}

function renderFillBlank(s){
  blankWords=getBlankWords(s.en);
  const bi=new Set(blankWords.map(b=>b.i));
  const words=s.en.split(/\s+/);
  let html='<div class="sentence-display">';
  words.forEach((w,i)=>{
    if(bi.has(i)){
      const clean=w.replace(/[^a-zA-Z]/g,'');
      const pre=w.match(/^[^a-zA-Z]*/)[0];
      const post=w.match(/[^a-zA-Z]*$/)[0];
      const sz=Math.max(80,clean.length*14);
      html+=`${pre}<input class="blank-input" data-idx="${i}" data-answer="${clean.toLowerCase()}" style="width:${sz}px" autocomplete="off" autocorrect="off" spellcheck="false">${post} `;
    }else{html+=w+' ';}
  });
  html+='</div>';
  html+='<div class="btn-row"><button class="btn btn-primary" onclick="checkFillBlank()">확인 ✓</button><button class="btn btn-secondary" onclick="showAnswer()">정답 보기</button></div>';
  html+='<div class="result-display" id="fillResult"></div>';
  document.getElementById('quizContent').innerHTML=html;
  document.querySelectorAll('.blank-input').forEach(inp=>inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkFillBlank();}));
}

function checkFillBlank(){
  if(answered)return;
  const inputs=document.querySelectorAll('.blank-input');
  let allOk=true,anyFilled=false;
  inputs.forEach(inp=>{
    const v=inp.value.trim().toLowerCase().replace(/[^a-z]/g,'');
    const a=inp.dataset.answer.replace(/[^a-z]/g,'');
    if(v)anyFilled=true;
    if(v===a){inp.classList.add('correct');inp.classList.remove('wrong');}
    else{inp.classList.add('wrong');inp.classList.remove('correct');allOk=false;}
  });
  if(!anyFilled){showToast('단어를 입력해주세요!');return;}
  answered=true;
  const r=document.getElementById('fillResult');
  if(allOk){correctCount++;streak++;r.className='result-display show correct-result';r.innerHTML='🎉 정답! '+currentSentence.en;updateMastery(true);showToast('정답입니다! 🔥','success');setTimeout(()=>nextSentence(),1800);}
  else{wrongCount++;streak=0;r.className='result-display show wrong-result';r.innerHTML='❌ 정답: <span class="answer-highlight">'+currentSentence.en+'</span>';updateMastery(false);showToast('틀렸습니다!','error');}
  updateStats();
}

function showAnswer(){
  document.querySelectorAll('.blank-input').forEach(inp=>{inp.value=inp.dataset.answer;inp.classList.add('correct');});
  const r=document.getElementById('fillResult');r.className='result-display show wrong-result';r.innerHTML='💡 정답: <span class="answer-highlight">'+currentSentence.en+'</span>';
  answered=true;wrongCount++;streak=0;updateMastery(false);updateStats();
}

function renderDictation(s){
  let html='<p style="color:var(--text-dim);font-size:13px;margin-bottom:12px;">🎧 문장을 듣고 받아 적어보세요</p>';
  html+='<textarea class="dictation-area" id="dictArea" placeholder="들은 문장을 그대로 입력하세요..." rows="2"></textarea>';
  html+='<div style="height:12px"></div>';
  html+='<div class="btn-row"><button class="btn btn-primary" onclick="checkDictation()">제출 ✓</button><button class="btn btn-secondary" onclick="playSentence()">🔊 다시 듣기</button><button class="btn btn-ghost" onclick="showDictationAnswer()">정답 보기</button></div>';
  html+='<div class="result-display" id="dictResult"></div>';
  document.getElementById('quizContent').innerHTML=html;
  document.getElementById('dictArea').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();checkDictation();}});
  setTimeout(()=>playSentence(),300);
}

function norm(s){return s.toLowerCase().replace(/[^a-z\s]/g,'').replace(/\s+/g,' ').trim();}

function checkDictation(){
  if(answered)return;
  const area=document.getElementById('dictArea');
  const ut=area.value.trim();
  if(!ut){showToast('문장을 입력해주세요!');return;}
  const cWords=norm(currentSentence.en).split(' ');
  const uWords=norm(ut).split(' ');
  let match=0;
  let diffHtml='';
  for(let i=0;i<cWords.length;i++){
    if(uWords[i]===cWords[i]){diffHtml+=`<span class="diff-correct">${cWords[i]}</span> `;match++;}
    else if(uWords[i]){diffHtml+=`<span class="diff-wrong">${uWords[i]}</span><span class="diff-correct">${cWords[i]}</span> `;}
    else{diffHtml+=`<span class="diff-correct">[${cWords[i]}]</span> `;}
  }
  const pct=Math.round(match/cWords.length*100);
  answered=true;
  const r=document.getElementById('dictResult');
  if(pct===100){correctCount++;streak++;area.classList.add('correct');r.className='result-display show correct-result';r.innerHTML=`🎉 완벽해요! (${pct}%)<br>${diffHtml}`;updateMastery(true);showToast('완벽합니다! 🔥','success');setTimeout(()=>nextSentence(),2000);}
  else{wrongCount++;streak=0;area.classList.add('wrong');r.className='result-display show wrong-result';r.innerHTML=`📊 ${pct}% 일치<br>${diffHtml}`;updateMastery(pct>=70);showToast(`${pct}% 정확도`,pct>=70?'':'error');}
  updateStats();
}

function showDictationAnswer(){
  const r=document.getElementById('dictResult');r.className='result-display show wrong-result';r.innerHTML='💡 정답: <span class="answer-highlight">'+currentSentence.en+'</span>';
  document.getElementById('dictArea').classList.add('wrong');answered=true;wrongCount++;streak=0;updateMastery(false);updateStats();
}

function renderListenMode(s){
  let html='<div style="text-align:center;padding:20px 0;">';
  html+=`<div style="font-family:'DM Mono',monospace;font-size:18px;line-height:1.8;color:var(--text);padding:20px;background:var(--surface2);border-radius:12px;margin-bottom:16px;">${s.en}</div>`;
  html+=`<div style="font-size:14px;color:var(--text-dim);padding:8px 16px;background:var(--surface2);border-radius:8px;display:inline-block;">${s.ko}</div>`;
  html+='</div><div class="btn-row" style="justify-content:center;margin-top:16px;"><button class="btn btn-primary" onclick="nextSentence()">다음 문장 →</button></div>';
  document.getElementById('quizContent').innerHTML=html;
  setTimeout(()=>playSentence(),300);
}

function loadCurrent(){
  if(queuePos>=queue.length){document.getElementById('quizCard').style.display='none';document.getElementById('congratsDiv').classList.add('show');return;}
  document.getElementById('quizCard').style.display='block';document.getElementById('congratsDiv').classList.remove('show');
  const idx=queue[queuePos];currentSentence=SENTENCES[idx];answered=false;hintVisible=false;
  document.getElementById('sentenceNum').textContent=`SENTENCE #${idx+1} — ${queuePos+1}/${queue.length}`;
  document.getElementById('koreanHint').className='korean-hint';document.getElementById('koreanHint').textContent=currentSentence.ko;
  document.getElementById('currentIdx').textContent=idx+1;
  if(currentMode==='fillblank')renderFillBlank(currentSentence);
  else if(currentMode==='dictation')renderDictation(currentSentence);
  else renderListenMode(currentSentence);
  updateDots();updateStats();
}

function nextSentence(){queuePos++;loadCurrent();}
function skipSentence(){nextSentence();}
function prevSentence(){if(queuePos>0){queuePos--;loadCurrent();}}
function toggleHint(){hintVisible=!hintVisible;document.getElementById('koreanHint').classList.toggle('show',hintVisible);}

function updateMastery(ok){const idx=queue[queuePos];if(ok)mastered.add(idx);}

function updateDots(){
  const grid=document.getElementById('memorizedGrid');
  const total=rangeEnd-rangeStart+1;
  if(total>100){grid.innerHTML='';return;}
  grid.innerHTML='';
  for(let i=rangeStart;i<=rangeEnd;i++){
    const d=document.createElement('div');
    d.className='mem-dot'+(mastered.has(i)?' done':'')+(i===queue[queuePos]?' current':'');
    d.title=`#${i+1}`;grid.appendChild(d);
  }
}

function updateStats(){
  document.getElementById('correctCount').textContent=correctCount;
  document.getElementById('wrongCount').textContent=wrongCount;
  document.getElementById('streakCount').textContent=streak;
  document.getElementById('masteredCount').textContent=mastered.size;
  const total=correctCount+wrongCount;
  document.getElementById('accuracyPct').textContent=total?Math.round(correctCount/total*100)+'%':'—';
  document.getElementById('progressFill').style.width=(queuePos/queue.length*100)+'%';
}

function restartAll(){correctCount=0;wrongCount=0;streak=0;mastered.clear();buildQueue();loadCurrent();}

function showToast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);
}

buildQueue();loadCurrent();
</script>
</body>
</html>
